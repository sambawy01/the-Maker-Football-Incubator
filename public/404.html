<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Maker Football Incubator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      GitHub Pages SPA redirect shim (Rafgraph).
      pathSegmentsToKeep = 1 because we deploy under /the-Maker-Football-Incubator/.
      This script converts the path to a query string and redirects to the
      project root, where index.html's matching script reconstructs the URL.
      Reference: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body>
    <p>
      Redirecting to
      <a href="/the-Maker-Football-Incubator/">The Maker Football Incubator</a>…
    </p>
  </body>
</html>
