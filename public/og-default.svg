<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The Maker Football Incubator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="12" height="630" fill="url(#accent)"/>

  <!-- Top eyebrow -->
  <g transform="translate(80, 130)">
    <rect x="0" y="0" width="48" height="4" fill="#16A34A"/>
    <text x="64" y="6" font-family="-apple-system, Segoe UI, Inter, Arial, sans-serif"
          font-size="20" font-weight="700" letter-spacing="6" fill="#16A34A">
      EGYPT'S PREMIUM YOUTH FOOTBALL ACADEMY
    </text>
  </g>

  <!-- Wordmark -->
  <text x="80" y="290" font-family="-apple-system, Segoe UI, Inter, Arial, sans-serif"
        font-size="140" font-weight="900" fill="#ffffff" letter-spacing="-3">
    THE MAKER
  </text>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="-apple-system, Segoe UI, Inter, Arial, sans-serif"
        font-size="56" font-weight="500" fill="#94A3B8" letter-spacing="-1">
    Football Incubator
  </text>

  <!-- Tagline -->
  <text x="80" y="470" font-family="-apple-system, Segoe UI, Inter, Arial, sans-serif"
        font-size="26" font-weight="400" fill="#CBD5E1">
    Scholarships. European pathways. The next generation of Egyptian talent.
  </text>

  <!-- Footer band -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="36" height="36" rx="6" fill="#16A34A"/>
    <text x="22" y="26" font-family="-apple-system, Segoe UI, Inter, Arial, sans-serif"
          font-size="22" font-weight="900" fill="#0F172A" text-anchor="middle">M</text>
    <text x="56" y="26" font-family="-apple-system, Segoe UI, Inter, Arial, sans-serif"
          font-size="22" font-weight="700" fill="#ffffff">
      themaker.eg
    </text>
    <text x="1120" y="26" font-family="-apple-system, Segoe UI, Inter, Arial, sans-serif"
          font-size="18" font-weight="600" fill="#94A3B8" text-anchor="end">
      Founded by Ahmed "Mido" Hossam
    </text>
  </g>
</svg>
