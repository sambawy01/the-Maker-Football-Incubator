    <!--
      GitHub Pages SPA redirect shim (Rafgraph). Pairs with public/404.html.
      When a deep link hits the GH Pages 404, 404.html rewrites it as a query
      string and redirects to "/". This script restores the original URL via
      history.replaceState before React loads, so React Router sees the real
      pathname.
      Reference: https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
